# /etc/nginx/sites-available/roofied.conf
#
# Reverse-proxy for Roofied (roofied-app on 127.0.0.1:8084).
# Blazor Server uses SignalR over WebSockets, so the Upgrade headers are required.
#
# NOTE: the `map $http_upgrade $connection_upgrade { ... }` block is defined ONCE
# in the awblazor site config (http context, shared across all sites). Do NOT
# redefine it here or nginx will error on duplicate map.
#
# Install (HTTP first, then let certbot add HTTPS):
#   sudo cp /opt/roofied/deployment/nginx-roofied.conf /etc/nginx/sites-available/roofied.conf
#   sudo ln -s /etc/nginx/sites-available/roofied.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d roofied.alibalib.com
# certbot rewrites this server block to listen 443 ssl, installs the cert, and
# adds the HTTP->HTTPS redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name roofied.alibalib.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    client_max_body_size 25m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://127.0.0.1:8084;
        proxy_http_version 1.1;

        # WebSocket upgrade — REQUIRED for Blazor Server (uses $connection_upgrade
        # from the map defined in the awblazor site config).
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ /\.(ht|git|env) { deny all; return 404; }
}
